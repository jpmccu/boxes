<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boxes — Graph Editor</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@sjmc11/tourguidejs/dist/css/tour.min.css">
  <style>
    html, body { height: 100%; overflow: hidden; }
    body { background: #1a1a2e; }
    #app { display: flex; flex-direction: column; height: 100vh; }
    #main-area { display: flex; flex: 1; overflow: hidden; }
    #editor-container { flex: 1; overflow: hidden; background: #fff; }
    #welcome-screen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #e0e0e0; }
    #welcome-screen h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    #welcome-screen p { color: #aaa; margin-bottom: 2rem; }
    .template-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 12px; max-width: 620px; }
    .template-card { background: #2a2a3e; border: 1px solid #444; border-radius: 8px; padding: 16px; cursor: pointer; transition: border-color .2s, background .2s; }
    .template-card:hover { background: #3a3a5e; border-color: #6c8ebf; }
    .template-card h3 { font-size: 1rem; color: #e0e0e0; margin: 0 0 4px; }
    .template-card p { font-size: 0.8rem; color: #aaa; margin: 0; }

    /* ── TourGuide.js — neutralise Bootstrap conflicts ─────────────────────── */
    /* The backdrop uses position:absolute, but body{overflow:hidden} clips the
       box-shadow overlay. Switch to fixed so it escapes the stacking context. */
    .tg-backdrop {
      position: fixed !important;
    }
    /* Keep dialog above Bootstrap's navbar (z ~1030) but do NOT force
       position:fixed — tourguide's floating-ui placement calculates coords
       for position:absolute and the two would produce the same result here
       (no body scroll), but forcing fixed can break edge-detection/flipping. */
    .tg-dialog {
      z-index: 10000 !important;
      background: #fff !important;
      color: #252525 !important;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important;
      font-size: .9rem !important;
      line-height: 1.45 !important;
      box-sizing: border-box !important;
    }
    /* Bootstrap resets line-height/font on all elements — undo inside dialog. */
    .tg-dialog *, .tg-dialog *::before, .tg-dialog *::after {
      box-sizing: border-box !important;
      line-height: inherit !important;
    }
    /* Undo Bootstrap's global button resets within the dialog. */
    .tg-dialog button {
      display: inline-block !important;
      padding: 0 !important;
      margin: 0 !important;
      border: none !important;
      background: none !important;
      font: inherit !important;
      color: inherit !important;
      cursor: pointer !important;
      text-transform: none !important;
      border-radius: 0 !important;
    }
    /* Re-apply tourguide's own footer button styles with enough specificity. */
    .tg-dialog .tg-dialog-footer button.tg-dialog-btn {
      padding: 5px 10px !important;
      border: 1px solid #cbcfd5 !important;
      color: #6f727e !important;
      background: #fff !important;
      border-radius: 4px !important;
      font-weight: 500 !important;
      font-size: .82rem !important;
      white-space: nowrap !important;
    }
    .tg-dialog .tg-dialog-footer button.tg-dialog-btn + button.tg-dialog-btn {
      margin-left: auto !important;
    }
    .tg-dialog .tg-dialog-footer button.tg-dialog-btn:hover {
      color: #464852 !important; border-color: #b5b7c2 !important;
    }
    .tg-dialog .tg-dialog-footer button.tg-dialog-btn:active {
      color: #4655cb !important; background: #f1f2ff !important; border-color: #5362d9 !important;
    }
    .tg-dialog .tg-dialog-header { display: flex !important; align-items: center !important; }
    .tg-dialog .tg-dialog-footer { display: flex !important; align-items: center !important; }
  </style>
</head>
<body>
<div id="app">
  <nav class="navbar navbar-dark bg-dark py-1 px-3 flex-shrink-0" style="min-height:44px">
    <span class="navbar-brand me-3 py-0" style="font-size:1.1rem">&#128230; Boxes</span>
    <div class="d-flex gap-2">
      <button id="new-btn" class="btn btn-sm btn-outline-light" title="New graph">New</button>
      <button id="open-btn" class="btn btn-sm btn-outline-light" title="Open file">Open</button>
      <button id="save-btn" class="btn btn-sm btn-outline-light" title="Save file">Save</button>
    </div>
    <div class="vr mx-2 bg-secondary align-self-center" style="height:20px"></div>
    <div class="d-flex gap-2">
      <div class="dropdown">
        <button class="btn btn-sm btn-outline-info dropdown-toggle" id="import-btn"
                data-bs-toggle="dropdown" aria-expanded="false" title="Import from another format">
          Import
        </button>
        <ul class="dropdown-menu dropdown-menu-dark" id="import-menu">
          <!-- populated by app.js -->
        </ul>
      </div>
      <div class="dropdown">
        <button class="btn btn-sm btn-outline-success dropdown-toggle" id="export-btn"
                data-bs-toggle="dropdown" aria-expanded="false" title="Export to another format">
          Export
        </button>
        <ul class="dropdown-menu dropdown-menu-dark" id="export-menu">
          <!-- populated by app.js -->
        </ul>
      </div>
    </div>
    <div class="vr mx-2 bg-secondary align-self-center" style="height:20px"></div>
    <button id="tour-btn" class="btn btn-sm btn-outline-warning ms-auto" title="Take a guided tour of the editor">&#x2753; Tour</button>
    <input type="file" id="file-input" accept=".json" class="d-none">
    <input type="file" id="import-file-input" class="d-none">
  </nav>
  <div id="main-area">
    <div id="welcome-screen">
      <h1>Boxes</h1>
      <p>A Cytoscape.js graph editor</p>
      <div class="template-grid" id="template-grid"></div>
      <p style="margin-top:1.5rem;font-size:0.85rem">
        <a href="../docs/tutorial.html" style="color:#6c8ebf">📖 Building an OWL Ontology — step-by-step tutorial</a>
      </p>
    </div>
    <div id="editor-container" class="d-none"></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
