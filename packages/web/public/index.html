<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boxes — Graph Editor</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    html, body { height: 100%; overflow: hidden; }
    body { background: #1a1a2e; }
    #app { display: flex; flex-direction: column; height: 100vh; }
    #main-area { display: flex; flex: 1; overflow: hidden; }
    #editor-container { flex: 1; overflow: hidden; background: #fff; }
    #welcome-screen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #e0e0e0; }
    #welcome-screen h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    #welcome-screen p { color: #aaa; margin-bottom: 2rem; }
    .template-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 12px; max-width: 620px; }
    .template-card { background: #2a2a3e; border: 1px solid #444; border-radius: 8px; padding: 16px; cursor: pointer; transition: border-color .2s, background .2s; }
    .template-card:hover { background: #3a3a5e; border-color: #6c8ebf; }
    .template-card h3 { font-size: 1rem; color: #e0e0e0; margin: 0 0 4px; }
    .template-card p { font-size: 0.8rem; color: #aaa; margin: 0; }
  </style>
</head>
<body>
<div id="app">
  <nav class="navbar navbar-dark bg-dark py-1 px-3 flex-shrink-0" style="min-height:44px">
    <span class="navbar-brand me-3 py-0" style="font-size:1.1rem">&#128230; Boxes</span>
    <div class="d-flex gap-2">
      <button id="new-btn" class="btn btn-sm btn-outline-light" title="New graph">New</button>
      <button id="open-btn" class="btn btn-sm btn-outline-light" title="Open file">Open</button>
      <button id="save-btn" class="btn btn-sm btn-outline-light" title="Save file">Save</button>
    </div>
    <input type="file" id="file-input" accept=".json" class="d-none">
  </nav>
  <div id="main-area">
    <div id="welcome-screen">
      <h1>Boxes</h1>
      <p>A Cytoscape.js graph editor</p>
      <div class="template-grid" id="template-grid"></div>
    </div>
    <div id="editor-container" class="d-none"></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
