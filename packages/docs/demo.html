<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Demo — Boxes</title>
  <meta name="description" content="Try the Boxes graph editor live in your browser.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>">
  <link rel="stylesheet" href="./src/style.css">
  <style>
    html, body { height: 100%; overflow: hidden; }
    .demo-page {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .demo-bar {
      flex-shrink: 0;
      background: var(--color-hero-bg);
      color: rgba(255,255,255,0.85);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 20px;
      height: 44px;
      font-size: 0.85rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .demo-bar a {
      color: #93b8f0;
      text-decoration: none;
      font-weight: 500;
    }
    .demo-bar a:hover { text-decoration: underline; }
    .demo-bar .sep { color: rgba(255,255,255,0.2); }
    .demo-bar .badge-live {
      background: #16a34a;
      color: white;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 100px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .demo-frame-wrapper {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    .demo-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    .demo-loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      color: rgba(255,255,255,0.6);
      gap: 12px;
      font-size: 0.9rem;
    }
    .demo-loading .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(74,127,212,0.3);
      border-top-color: #4a7fd4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .demo-loading.hidden { display: none; }
  </style>
</head>
<body>
  <div class="demo-page">
    <!-- Slim top bar -->
    <div class="demo-bar">
      <a href="./">← Boxes</a>
      <span class="sep">|</span>
      <span>Live Demo</span>
      <span class="badge-live">live</span>
      <span class="sep" style="margin-left:auto">|</span>
      <a href="api.html">API Docs</a>
      <a href="https://github.com/boxes-project/boxes" target="_blank" rel="noopener">GitHub ↗</a>
    </div>

    <!-- Demo iframe -->
    <div class="demo-frame-wrapper">
      <div class="demo-loading" id="loading">
        <div class="spinner"></div>
        <span>Loading editor…</span>
      </div>
      <iframe
        class="demo-frame"
        id="demo-iframe"
        src="/demo/index.html"
        title="Boxes graph editor demo"
        allow="fullscreen"
      ></iframe>
    </div>
  </div>

  <script type="module" src="/src/demo.js"></script>
</body>
</html>
