<!DOCTYPE html>
<!--
  Standalone reproduction for: edges invisible after cy.elements().remove() + cy.add() + cy.style().fromJson().update()
  Cytoscape.js 3.33.1 · WebGL renderer

  Steps to reproduce:
    1. Create a Cytoscape instance with some initial nodes/edges.
    2. Call cy.elements().remove() to clear the graph.
    3. Call cy.add([...nodes, ...edges]) to re-add the elements.
    4. Call cy.style().fromJson([...]).update() to apply a stylesheet.
    5. Observe: edges are invisible (not rendered) until they are selected.

  Expected: edges render immediately after cy.add() + stylesheet application.
  Actual:   edges are invisible; only the label and selection overlay appear on click.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cytoscape.js Edge Visibility Bug Repro</title>
  <style>
    body { font-family: sans-serif; margin: 0; padding: 12px; background: #f5f5f5; }
    h2 { margin: 0 0 8px; font-size: 16px; }
    #controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    button {
      padding: 6px 12px; cursor: pointer; border: 1px solid #888; border-radius: 4px;
      background: #fff; font-size: 13px;
    }
    button:hover { background: #e8e8e8; }
    #status {
      font-size: 13px; padding: 6px 10px; border-radius: 4px;
      background: #fff; border: 1px solid #ccc; margin-bottom: 8px;
      max-height: 140px; overflow-y: auto; white-space: pre-wrap; font-family: monospace;
    }
    #layout {
      display: flex; gap: 12px;
    }
    .cy-wrap {
      flex: 1; display: flex; flex-direction: column; gap: 4px;
    }
    .cy-wrap label { font-size: 12px; font-weight: bold; color: #555; }
    .cy-container {
      width: 100%; height: 380px; border: 2px solid #aaa; background: #fff; border-radius: 4px;
    }
  </style>
</head>
<body>
  <h2>Cytoscape.js Edge Visibility Bug · <span id="ver"></span></h2>

  <div id="controls">
    <button id="btnInit">1 · Fresh init (baseline)</button>
    <button id="btnReload">2 · Remove + re-add (bug scenario)</button>
    <button id="btnFix">3 · Remove + re-add + workaround</button>
    <button id="btnInspect">4 · Inspect rs.allpts</button>
  </div>

  <div id="status">Click a button above to run a scenario.</div>

  <div id="layout">
    <div class="cy-wrap">
      <label>Left pane — Fresh init (expected)</label>
      <div id="cy-left" class="cy-container"></div>
    </div>
    <div class="cy-wrap">
      <label>Right pane — Remove + re-add (reproduces bug?)</label>
      <div id="cy-right" class="cy-container"></div>
    </div>
  </div>

  <script src="node_modules/cytoscape/dist/cytoscape.umd.js"></script>
  <script>
  'use strict';

  document.getElementById('ver').textContent = 'v' + cytoscape.version;

  const log = (...args) => {
    const el = document.getElementById('status');
    el.textContent += args.join(' ') + '\n';
    el.scrollTop = el.scrollHeight;
  };
  const clearLog = () => { document.getElementById('status').textContent = ''; };

  // ── Shared graph data (mimics what exportGraph() produces) ────────────────
  const ELEMENTS = {
    nodes: [
      { data: { id: 'n1', label: 'Alice' }, position: { x: 150, y: 150 } },
      { data: { id: 'n2', label: 'Bob'   }, position: { x: 350, y: 150 } },
      { data: { id: 'n3', label: 'Carol' }, position: { x: 250, y: 300 } }
    ],
    edges: [
      { data: { id: 'e1', source: 'n1', target: 'n2', label: 'knows' } },
      { data: { id: 'e2', source: 'n2', target: 'n3', label: 'knows' } },
      { data: { id: 'e3', source: 'n3', target: 'n1', label: 'knows' } }
    ]
  };

  const STYLESHEET = [
    {
      selector: 'node',
      style: {
        'label': 'data(label)',
        'background-color': '#666',
        'color': '#fff',
        'text-valign': 'center',
        'text-halign': 'center',
        'font-size': '12px',
        'width': '60px',
        'height': '60px'
      }
    },
    {
      selector: 'edge',
      style: {
        'label': 'data(label)',
        'width': 2,
        'line-color': '#999',
        'target-arrow-color': '#999',
        'target-arrow-shape': 'triangle',
        'curve-style': 'bezier',
        'font-size': '10px'
      }
    },
    {
      selector: ':selected',
      style: {
        'overlay-color': '#4A90E2',
        'overlay-padding': 6,
        'overlay-opacity': 0.25,
        'border-width': 3,
        'border-color': '#4A90E2'
      }
    }
  ];

  // ── Cytoscape instances ────────────────────────────────────────────────────
  let cyLeft = null;
  let cyRight = null;

  function destroyCy(cy) {
    try { if (cy) cy.destroy(); } catch (e) { /* ignore */ }
  }

  function makeBaseCy(container) {
    return cytoscape({
      container,
      // Start empty — elements are added by scenarios
      elements: [],
      style: STYLESHEET,
      layout: { name: 'preset' }
    });
  }

  // ── Scenario helpers ───────────────────────────────────────────────────────

  /**
   * Scenario A: fresh cytoscape init with elements included.
   * This is the EXPECTED/WORKING baseline.
   */
  function scenarioFreshInit(container) {
    return cytoscape({
      container,
      elements: [...ELEMENTS.nodes, ...ELEMENTS.edges],
      style: STYLESHEET,
      layout: { name: 'preset' }
    });
  }

  /**
   * Scenario B: remove all elements then re-add them, then re-apply stylesheet.
   * This mimics what BoxesEditor.loadElements() does on file open.
   *
   * Bug: edges are invisible after this sequence.
   */
  function scenarioRemoveAndReAdd(cy) {
    // Step 1: clear existing graph (same as loadElements start)
    cy.elements().remove();

    // Step 2: re-add all nodes + edges together in ONE cy.add() call
    const all = [...ELEMENTS.nodes, ...ELEMENTS.edges];
    cy.add(all);

    // Step 3: re-apply stylesheet (same as _updateStylesheet)
    cy.style().fromJson(STYLESHEET).update();

    // Step 4: fit
    cy.fit(undefined, 30);
  }

  /**
   * Scenario C: same as B but with the workaround (dirty rstyle after reload).
   * Tests whether the rstyle.clean hack actually fixes the rendering.
   */
  function scenarioRemoveAndReAddWithHack(cy) {
    cy.elements().remove();
    const all = [...ELEMENTS.nodes, ...ELEMENTS.edges];
    cy.add(all);
    cy.style().fromJson(STYLESHEET).update();

    // Workaround: force rstyle dirty so edges are recalculated on next frame
    cy.elements().forEach(ele => { ele._private.rstyle.clean = false; });

    cy.fit(undefined, 30);
  }

  // ── Inspection helper ─────────────────────────────────────────────────────

  function inspectEdges(cy, label) {
    log(`\n── ${label} ──`);
    cy.edges().forEach(edge => {
      const rs = edge._private.rscratch;
      const style = edge._private.style;
      const rstyle = edge._private.rstyle;
      const allpts = rs ? rs.allpts : undefined;
      const width = style && style['width'] ? style['width'].value : '(not computed)';
      log(
        `  edge ${edge.id()}:` +
        `  allpts=${allpts == null ? 'NULL ⚠' : `[${allpts.length} pts] ✓`}` +
        `  rstyle.clean=${rstyle ? rstyle.clean : '?'}` +
        `  style.width=${width}` +
        `  takesUpSpace=${edge.takesUpSpace()}`
      );
    });
  }

  // ── Button handlers ────────────────────────────────────────────────────────

  document.getElementById('btnInit').addEventListener('click', () => {
    clearLog();
    log('Running scenario 1: fresh init...');
    destroyCy(cyLeft);
    destroyCy(cyRight);
    document.getElementById('cy-left').innerHTML = '';
    document.getElementById('cy-right').innerHTML = '';

    cyLeft  = scenarioFreshInit(document.getElementById('cy-left'));
    cyRight = scenarioFreshInit(document.getElementById('cy-right'));

    requestAnimationFrame(() => {
      log('After first RAF:');
      inspectEdges(cyLeft,  'LEFT (fresh init)');
      inspectEdges(cyRight, 'RIGHT (fresh init)');
      log('\n→ Both should show allpts ✓');
    });
  });

  document.getElementById('btnReload').addEventListener('click', () => {
    clearLog();
    log('Running scenario 2: remove + re-add (bug scenario)...');
    destroyCy(cyLeft);
    destroyCy(cyRight);
    document.getElementById('cy-left').innerHTML = '';
    document.getElementById('cy-right').innerHTML = '';

    // Left: fresh init (baseline to compare against)
    cyLeft = scenarioFreshInit(document.getElementById('cy-left'));

    // Right: empty cy, then remove+re-add (the bug)
    cyRight = makeBaseCy(document.getElementById('cy-right'));
    scenarioRemoveAndReAdd(cyRight);

    requestAnimationFrame(() => {
      log('After first RAF:');
      inspectEdges(cyLeft,  'LEFT (fresh init — baseline)');
      inspectEdges(cyRight, 'RIGHT (remove+re-add — BUG?)');
      log('\n→ If RIGHT shows allpts=NULL, the bug is reproduced.');
      log('→ Click edges on the right to see if they appear after selection.');
    });
  });

  document.getElementById('btnFix').addEventListener('click', () => {
    clearLog();
    log('Running scenario 3: remove + re-add + rstyle.clean hack...');
    destroyCy(cyLeft);
    destroyCy(cyRight);
    document.getElementById('cy-left').innerHTML = '';
    document.getElementById('cy-right').innerHTML = '';

    cyLeft  = makeBaseCy(document.getElementById('cy-left'));
    scenarioRemoveAndReAdd(cyLeft);

    cyRight = makeBaseCy(document.getElementById('cy-right'));
    scenarioRemoveAndReAddWithHack(cyRight);

    requestAnimationFrame(() => {
      log('After first RAF:');
      inspectEdges(cyLeft,  'LEFT (remove+re-add, no fix)');
      inspectEdges(cyRight, 'RIGHT (remove+re-add + rstyle hack)');
      log('\n→ Do both show NULL, or does the hack fix it?');
    });
  });

  document.getElementById('btnInspect').addEventListener('click', () => {
    clearLog();
    log('Inspecting current state of both panes:');
    if (cyLeft)  inspectEdges(cyLeft,  'LEFT');
    if (cyRight) inspectEdges(cyRight, 'RIGHT');
    if (!cyLeft && !cyRight) log('No instances running — run a scenario first.');
  });
  </script>
</body>
</html>
