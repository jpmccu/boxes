name: Release to npm

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build core (required by Vue/React tests)
        run: npm run build --workspace=packages/core

      - name: Run tests
        run: npm test

  release:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write   # required for npm provenance
    strategy:
      matrix:
        package:
          - core
          - vue
          - react
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build @boxes/${{ matrix.package }}
        run: npm run build --workspace=packages/${{ matrix.package }}

      - name: Publish @boxes/${{ matrix.package }}
        run: npm publish --workspace=packages/${{ matrix.package }} --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
